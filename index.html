<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>AI 舉手體感挑戰賽</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/pose@0.8/dist/teachablemachine-pose.min.js"></script>
  
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main>
    <h1>AI 舉手挑戰賽</h1>
    <p>規則：偵測到 <span>handup</span> 超過 80% 加 1 分！</p>
    
    <button type="button" onclick="init()">啟動運動相機</button>
    
    <div id="status">等待指令中...</div>
    
    <div class="canvas-container">
      <video id="video" width="400" height="400" autoplay playsinline muted style="display:none;"></video>
      <canvas id="canvas" width="400" height="400"></canvas>
    </div>

    <div id="label-container"></div>
    
    <div class="score-box">
      <h2 id="score-display">0</h2>
      <span class="score-label">SCORE</span>
    </div>
  </main>

  <script>
    // 串接你剛出爐的全新大腦網址
    const URL = "https://teachablemachine.withgoogle.com/models/_qNCgNZbP/";

    let model, ctx, video, canvas, maxPredictions;
    let score = 0;
    let canScore = true; // 控制 1 秒冷卻時間的開關

    async function init() {
        const statusDiv = document.getElementById("status");
        statusDiv.innerText = "正在喚醒相機權限...";

        try {
            video = document.getElementById("video");
            canvas = document.getElementById("canvas");
            ctx = canvas.getContext("2d");

            // 1. 直接向 iPad 請求硬體相機
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: "user", width: 400, height: 400 },
                audio: false
            });
            
            video.srcObject = stream;
            await video.play();
            
            statusDiv.innerText = "相機已就緒，正在下載 AI 新大腦...";

            // 2. 載入你的新模型檔案
            const modelURL = URL + "model.json";
