<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 節奏打擊王 - iPad 終極相容版</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/p5.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/pose@0.8/dist/teachablemachine-pose.min.js"></script>
    
    <style>
        body { 
            margin: 0; padding: 0; background-color: #0f172a; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; overflow: hidden; font-family: sans-serif; touch-action: none; 
        }
        #canvas-container { position: relative; box-shadow: 0 20px 40px rgba(0,0,0,0.6); border-radius: 16px; overflow: hidden; }
        /* 浮動狀態文字提示 */
        #status-overlay {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(30, 41, 59, 0.9); color: white; padding: 10px 20px;
            border-radius: 30px; font-size: 16px; font-weight: bold; z-index: 999;
            border: 1px solid rgba(255,255,255,0.1); pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="status-overlay">系統狀態：正在準備畫布...</div>
    <div id="canvas-container"></div>

<script>
// 填入你的專屬模型網址（結尾確保有斜線）
const MODEL_URL = "https://teachablemachine.withgoogle.com/models/Bcp6i6fs_/"; 

let model, webcam, maxPredictions;
let currentPose = "Idle";
let isAILoaded = false;

// 遊戲變數
let score = 0;
let notes = [];
let particles = [];
let targetY;
let spawnTimer = 0;
let isPunchCooldown = false;

function setup() {
    updateStatus("正在建立網頁畫布...");
    
    // 設定 iPad 適合的畫布大小
    let canvasWidth = Math.min(window.innerWidth * 0.95, 800);
    let canvasHeight = canvasWidth * (3 / 4); 
    let canvas = createCanvas(canvasWidth, canvasHeight);
    canvas.parent('canvas-container');
    
    targetY = height * 0.75;
    
    // 畫布建好後，立刻啟動 AI 載入程序
    startAI();
}

async function startAI() {
    updateStatus("正在下載 Google AI 模型...請稍候...");
    try {
        // 載入模型
        model = await tmPose.load(MODEL_URL + "model.json", MODEL_URL + "metadata.json");
        maxPredictions = model.getTotalClasses();
        
        updateStatus("模型下載成功！正在喚醒 iPad 前鏡頭...");
        
        // 初始化鏡頭
        webcam = new tmPose.Webcam(320, 240, true); // flip = true 鏡像
        await webcam.setup({ facingMode: "user" }); // 強制使用前鏡頭
        await webcam.play();
        
        isAILoaded = true;
        updateStatus("🎮 遊戲準備就緒！請就定位！");
        
        // 3秒後隱藏狀態列
        setTimeout(() => { document.getElementById('status-overlay').style.display = 'none'; }, 3000);
        
    } catch (error) {
        console.error(error);
        updateStatus("❌ 發生錯誤：" + error.message);
    }
}

function updateStatus(msg) {
    document.getElementById('status-overlay').innerText = msg;
}

function draw() {
    // 只要這個有跑，畫面就絕對不會是一片空白（會是深藍色）
    background(15, 23, 42); 

    // 如果 AI 還沒好，就在畫面上畫一個轉圈圈或提示，讓玩家知道網頁有在動
    if (!isAILoaded) {
        fill(255, 150);
        textSize(20);
        textAlign(CENTER, CENTER);
        text("⚙️ 正在努力連線硬體中，請稍候...", width / 2, height / 2);
        return; // 攔截後續動作，避免還沒載入完就報錯
    }

    // ========== 以下為 AI 載入成功後的遊戲核心畫面 ==========
    
    // 1. 驅動 AI 預測（放在 draw 迴圈裡最穩定）
    webcam.update();
    predict();

    // 2. 渲染攝影機畫面（右上角、半透明）
    push();
    translate(width, 0); scale(-1, 1);
    if (webcam.canvas) {
        drawingContext.globalAlpha = 0.25;
        drawingContext.drawImage(webcam.canvas, 15, 15, 160, 120);
        drawingContext.globalAlpha = 1.0;
    }
    pop();
    noFill(); stroke(255, 50); strokeWeight(2); rect(15, 15, 160, 120, 8);

    // 3. 判定線與判定點
    stroke(255, 30); strokeWeight(4); line(0, targetY, width, targetY);
    
    fill(56, 189, 248, currentPose === "Left_Punch" ? 180 : 60);
    stroke(56, 189, 248); ellipse(width * 0.25, targetY, 80, 80);
    
    fill(244, 63, 94, currentPose === "Right_Punch" ? 180 : 60);
    stroke(244, 63, 94); ellipse(width * 0.75, targetY, 80, 80);

    // 4. 氣球生成與移動
    spawnTimer++;
    if (spawnTimer % 50 === 0) {
        let isLeft = random() > 0.5;
        notes.push({
            x: isLeft ? width * 0.25 : width * 0.75,
            y: -20,
            type: isLeft ? "Left_Punch" : "Right_Punch",
            speed: random(5, 8),
            active: true
        });
    }

    for (let i = notes.length - 1; i >= 0; i--) {
        let note = notes[i]; note.y += note.speed;
        if (note.active) {
            noStroke();
            fill(note.type === "Left_Punch" ? color(56, 189, 248) : color(244, 63, 94));
            ellipse(note.x, note.y, 55, 60);
        }
        if (note.y > height + 50) notes.splice(i, 1);
    }

    // 5. 爆炸粒子
    for (let i = particles.length - 1; i >= 0; i--) {
        let p = particles[i]; p.x += p.vx; p.y += p.vy; p.alpha -= 8;
        fill(p.color.levels[0], p.color.levels[1], p.color.levels[2], p.alpha); noStroke();
        ellipse(p.x, p.y, p.size);
        if (p.alpha <= 0) particles.splice(i, 1);
    }

    // 6. UI 計分板
    noStroke(); fill(30, 41, 59, 200); rect(width - 160, 15, 140, 50, 10);
    fill(255); textSize(22); textAlign(CENTER, CENTER); text(`得分: ${score}`, width - 90, 40);

    fill(30, 41, 59, 200); rect(width/2 - 130, 15, 260, 50, 10);
    textAlign(CENTER, CENTER); textSize(18);
    if (currentPose === "Idle") { fill(148, 163, 184); text(`🧘 預備中...`, width / 2, 40); } 
    else { fill(253, 224, 71); text(`🔥 擊打！ [ ${currentPose === 'Left_Punch' ? '左拳' : '右拳'} ]`, width / 2, 40); }
}

async function predict() {
    const { pose, posenetOutput } = await model.estimatePose(webcam.canvas);
    const prediction = await model.predict(posenetOutput);

    let highestPred = "Idle";
    let highestVal = 0;
    for (let i = 0; i < maxPredictions; i++) {
        if (prediction[i].probability > highestVal) {
            highestVal = prediction[i].probability;
            highestPred = prediction[i].className;
        }
    }

    if (highestVal > 0.80) {
        let oldPose = currentPose;
        currentPose = highestPred;
        if (oldPose === "Idle" && currentPose !== "Idle" && !isPunchCooldown) {
            checkHit(currentPose); 
            isPunchCooldown = true;
            setTimeout(() => { isPunchCooldown = false; }, 350); 
        }
    }
}

function checkHit(punchType) {
    for (let note of notes) {
        if (note.active && note.type === punchType) {
            let distance = abs(note.y - targetY);
            if (distance < 60) {
                score += 10; note.active = false;
                let pColor = punchType === "Left_Punch" ? color(56, 189, 248) : color(244, 63, 94);
                explode(note.x, note.y, pColor); break;
            }
        }
    }
}

function explode(x, y, pColor) {
    for (let i = 0; i < 15; i++) {
        particles.push({ x: x, y: y, vx: random(-5, 5), vy: random(-5, 5), size: random(5, 12), color: pColor, alpha: 255 });
    }
}

function windowResized() {
    let canvasWidth = Math.min(window.innerWidth * 0.95, 800);
    let canvasHeight = canvasWidth * (3 / 4); resizeCanvas(canvasWidth, canvasHeight); targetY = height * 0.75;
}
</script>
</body>
</html>
