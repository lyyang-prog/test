<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 左右極速協調挑戰</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/pose@0.8/dist/teachablemachine-pose.min.js"></script>
    
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #fff;
            overflow: hidden;
        }

        main {
            background: rgba(30, 41, 59, 0.75);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 25px;
            border-radius: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 90%;
            max-width: 400px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            font-size: 1.4rem;
            color: #22d3ee;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 0;
            margin-bottom: 15px;
        }

        button {
            background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
            color: #0f172a;
            border: none;
            padding: 16px 20px;
            font-size: 1.1rem;
            font-weight: 800;
            border-radius: 15px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 15px;
            box-shadow: 0 10px 20px rgba(0, 242, 254, 0.2);
        }

        #status {
            font-size: 14px;
            color: #38bdf8;
            margin-bottom: 15px;
            font-weight: 600;
        }

        /* 頂部指令框：隨機發光切換 */
        #target-command {
            margin-bottom: 15px;
            padding: 15px;
            border-radius: 15px;
            font-size: 1.6rem;
            font-weight: 900;
            background: #0f172a;
            border: 2px solid #334155;
            transition: all 0.3s ease;
        }

        .canvas-container {
            position: relative;
            border-radius: 20px;
            overflow: hidden;
            border: 3px solid #38bdf8;
            background: #000;
            line-height: 0;
            aspect-ratio: 1;
        }

        canvas {
            width: 100%;
            height: 100%;
        }

        #score-display {
            font-size: 4rem;
            margin: 5px 0 15px 0;
            color: #4ade80;
            font-weight: 900;
            text-shadow: 0 0 15px rgba(74, 222, 128, 0.4);
        }

        #label-container {
            font-size: 14px;
            background: rgba(255, 255, 255, 0.05);
            padding: 12px;
            border-radius: 12px;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <main>
        <h1>Coordination Test</h1>
        <button type="button" onclick="init()">START GAME</button>
        <div id="status">Ready to Scan</div>
        
        <div id="target-command" style="color: #64748b;">等待遊戲開始...</div>

        <div class="canvas-container">
            <canvas id="canvas"></canvas>
        </div>

        <div style="margin-top: 15px;">
            <div style="font-size: 0.8rem; color: #64748b; font-weight: bold; letter-spacing: 1px;">TOTAL REPS / SCORE</div>
            <h2 id="score-display">0</h2>
            
            <div id="label-container">請點擊上方按鈕開啟鏡頭</div>
        </div>
    </main>

    <script>
        // 已經精準填入你的最新 Teachable Machine 模型網址
        const URL = "https://teachablemachine.withgoogle.com/models/_qNCgNZbP/";

        let model, webcam, ctx, maxPredictions;
        let score = 0;
        let currentTarget = "handup"; // 用於對應你的模型標籤
        let commandTimer = null;

        // 協調指令循環：每 3 秒隨機更換一次動作，考驗玩家身體反應
        function startCommandLoop() {
            const cmdDiv = document.getElementById("target-command");
            commandTimer = setInterval(() => {
                if (Math.random() > 0.5) {
                    currentTarget = "handup";
                    cmdDiv.innerText = "🙌 動作指令：舉手！";
                    cmdDiv.style.borderColor = "#4ade80";
                    cmdDiv.style.color = "#4ade80";
                } else {
                    currentTarget = "handdown";
                    cmdDiv.innerText = "👇 動作指令：放下！";
                    cmdDiv.style.borderColor = "#f43f5e";
                    cmdDiv.style.color = "#f43f5e";
                }
            }, 3000); // 3000毫秒 = 3秒換一次指令
        }

        async function init() {
            const statusDiv = document.getElementById("status");
            statusDiv.innerText = "正在啟動攝像頭...";

            try {
                // 使用最初在 iPad 上 100% 順暢開啟的原生 tmPose.Webcam 核心架構
                const size = 400;
                const flip = true; 
                webcam = new tmPose.Webcam(size, size, flip); 
                
                await webcam.setup(); 
                await webcam.play();
                
                statusDiv.innerText = "相機已就緒，正在加載 AI 模型...";

                // 加載模型
                model = await tmPose.load(URL + "model.json", URL + "metadata.json");
                maxPredictions = model.getTotalClasses();

                // 設定畫布
                const canvas = document.getElementById("canvas");
                canvas.width = size;
                canvas.height = size;
                ctx = canvas.getContext("2d");

                statusDiv.innerText = "偵測中... 請看指令變換動作！";
                
                // 觸發指令隨機切換與遊戲主循環
                startCommandLoop();
                window.requestAnimationFrame(loop);
            } catch (e) {
                console.error(e);
                statusDiv.innerText = "錯誤: 無法開啟相機或載入模型。";
            }
        }

        async function loop(timestamp) {
            if (webcam) {
                webcam.update(); 
                await predict();
            }
            window.requestAnimationFrame(loop);
        }

        async function predict() {
            const { pose, posenetOutput } = await model.estimatePose(webcam.canvas);
            const prediction = await model.predict(posenetOutput);

            // 在 Canvas 上繪製鏡頭與彩色骨架線條
            if (pose) {
                if (webcam.canvas) {
                    ctx.drawImage(webcam.canvas, 0, 0);
                    const minPartConfidence = 0.5;
                    tmPose.drawKeypoints(pose.keypoints, minPartConfidence, ctx);
                    tmPose.drawSkeleton(pose.keypoints, minPartConfidence, ctx);
                }
            }

            // 動態搜尋並提取模型中的即時機率
            let handupProbability = 0;
            let handdownProbability = 0;

            for (let i = 0; i < maxPredictions; i++) {
                if (prediction[i].className === "handup") {
                    handupProbability = prediction[i].probability;
                } else if (prediction[i].className === "handdown") {
                    handdownProbability = prediction[i].probability;
                }
            }

            // 換算成 0 - 100 百分比
            let upPercent = (handupProbability * 100).toFixed(0);
            let downPercent = (handdownProbability * 100).toFixed(0);

            // 📊 實時顯示百分比，讓用戶清楚知道目前的進度差多少
            document.getElementById("label-container").innerHTML = 
                `🙌 舉手偵測: ${upPercent}% | 👇 放下偵測: ${downPercent}%`;

            // 🚀 核心分數結算：只要玩家的動作與指令一致，且對應百分比超過 70% (0.70)，就無上限瘋狂跳分！
            if (currentTarget === "handup" && handupProbability >= 0.70) {
                score++;
                document.getElementById("score-display").innerText = score;
            } else if (currentTarget === "handdown" && handdownProbability >= 0.70) {
                score++;
                document.getElementById("score-display").innerText = score;
            }
        }
    </script>
</body>
</html>
