<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>AI 體感運動遊戲</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/pose@latest/dist/teachablemachine-pose.min.js"></script>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main>
    <h1>AI 體感挑戰賽</h1>
    <p>規則：偵測到 <span>Class 3</span> 超過 70% 加 1 分！</p>
    
    <button type="button" onclick="init()">啟動運動相機</button>
    
    <div id="status">等待指令中...</div>
    
    <div class="canvas-container">
      <video id="video" width="400" height="400" autoplay playsinline muted style="display:none;"></video>
      <canvas id="canvas" width="400" height="400"></canvas>
    </div>

    <div id="label-container"></div>
    
    <div class="score-box">
      <h2 id="score-display">0</h2>
      <span class="score-label">SCORE</span>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
