<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 極速左右斷頭台 - 協調性挑戰</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/pose@0.8/dist/teachablemachine-pose.min.js"></script>
    
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: #fff;
            overflow: hidden;
        }

        main {
            background: rgba(30, 41, 59, 0.75); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            padding: 25px; border-radius: 30px; box-shadow: 0 25px 50px rgba(0,0,0,0.5); width: 90%; max-width: 400px;
            text-align: center; border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 { font-size: 1.4rem; color: #22d3ee; text-transform: uppercase; letter-spacing: 2px; margin: 0 0 15px 0; }

        button {
            background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%); color: #0f172a; border: none;
            padding: 16px 20px; font-size: 1.1rem; font-weight: 800; border-radius: 15px; cursor: pointer; width: 100%; margin-bottom: 15px;
            box-shadow: 0 10px 20px rgba(0, 242, 254, 0.2);
        }

        #status { font-size: 14px; color: #38bdf8; margin-bottom: 15px; font-weight: 600; }

        /* 頂部指令框：隨機發光切換 */
        #target-command {
            margin-bottom: 15px; padding: 15px; border-radius: 15px; font-size: 1.6rem; font-weight: 900;
            background: #0f172a; border: 2px solid #334155; transition: all 0.3s ease;
        }

        .canvas-container { position: relative; border-radius: 20px; overflow: hidden; border: 3px solid #38bdf8; background: #000; aspect-ratio: 1; }
        canvas { width: 100%; height: 100%; }

        #score-display { font-size: 4rem; margin: 10px 0; color: #4ade80; font-weight: 900; }

        /* 提示與語錄看板 */
        #label-container { font-size: 14px; color: #e2e8f0; background: rgba(255, 255, 255, 0.05); padding: 12px; border-radius: 12px; }
    </style>
</head>
<body>

    <main>
        <h1>Head Coordination</h1>
        <button type="button" onclick="init()">START GAME</button>
        <div id="status">Ready</div>
        
        <div id="target-command" style="color: #64748b;">等待遊戲開始...</div>

        <div class="canvas-container">
            <canvas id="canvas"></canvas>
        </div>

        <div style="margin-top: 15px;">
            <div style="font-size: 0.8rem; color: #64748b; font-weight: bold;">TOTAL SCORE</div>
            <h2 id="score-display">0</h2>
            <div id="label-container">請點擊上方按鈕開始集氣</div>
        </div>
    </main>
