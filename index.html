<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 節奏打擊王 - 60秒限時挑戰版</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/pose@0.8/dist/teachablemachine-pose.min.js"></script>
    
    <style>
        body {
            background-color: #0f172a; 
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            touch-action: none;
        }

        main {
            width: 90%;
            max-width: 450px;
            text-align: center;
            background: #1e293b;
            padding: 25px;
            border-radius: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        h1 {
            font-size: 1.6rem;
            color: #22d3ee; 
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0 0 15px 0;
        }

        button {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #22d3ee 0%, #0ea5e9 100%);
            color: #0f172a;
            border: none;
            border-radius: 15px;
            font-size: 1.2rem;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 10px 15px -3px rgba(34, 211, 238, 0.3);
            margin-bottom: 15px;
            transition: transform 0.1s;
        }

        button:active {
            transform: scale(0.98);
        }

        #status {
            font-size: 0.9rem;
            color: #38bdf8;
            margin-bottom: 15px;
            text-transform: uppercase;
            font-weight: bold;
            height: 20px;
        }

        .canvas-container {
            width: 100%;
            aspect-ratio: 4 / 3; 
            background: #000;
            border-radius: 20px;
            overflow: hidden;
            border: 3px solid #0ea5e9;
            box-shadow: 0 0 20px rgba(14, 165, 233, 0.4);
            line-height: 0;
            position: relative;
        }

        canvas {
            width: 100%;
            height: 100%;
        }

        /* 頂部數據列：分數、時間、AI狀態 */
        .score-card {
            margin-top: 15px;
            background: #0f172a;
            padding: 12px;
            border-radius: 20px;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        .score-box {
            text-align: center;
            flex: 1;
        }

        .label {
            font-size: 0.75rem;
            color: #64748b;
            letter-spacing: 1px;
            margin-bottom: 3px;
        }

        #score-display {
            font-size: 2rem;
            margin: 0;
            color: #4ade80; 
            font-weight: 900;
        }

        #time-display {
            font-size: 2rem;
            margin: 0;
            color: #f59e0b; /* 橘黃色時間 */
            font-weight: 900;
        }

        #label-container {
            font-size: 1rem;
            color: #22d3ee;
            font-weight: bold;
            margin-top: 5px;
        }

        /* 結算畫面覆蓋層 */
        #game-over-screen {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.95);
            border-radius: 30px;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        #game-over-screen h2 {
            color: #ef4444;
            font-size: 2.2rem;
            margin-bottom: 10px;
        }

        #final-score {
            font-size: 3.5rem;
            color: #4ade80;
            font-weight: 900;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <main>
        <h1>AI Rhythm Boxer</h1>
        <button type="button" id="start-btn" onclick="initOrRestart()">START GAME</button>
        <div id="status">Ready to Fight</div>
        
        <div class="canvas-container">
            <canvas id="canvas"></canvas>
        </div>

        <div class="score-card">
            <div class="score-box">
                <div class="label">SCORE</div>
                <h2 id="score-display">0</h2>
            </div>
            <div class="score-box" style="border-left: 1px solid #334155; border-right: 1px solid #334155;">
                <div class="label">TIME LEFT</div>
                <h2 id="time-display">60s</h2>
            </div>
            <div class="score-box">
                <div class="label">AI POSE</div>
                <div id="label-container">Waiting...</div>
            </div>
        </div>

        <div id="game-over-screen">
            <h2>TIME UP!</h2>
            <div class="label">YOUR FINAL SCORE</div>
            <div id="final-score">0</div>
            <button type="button" style="width: 80%; margin-top: 20px;" onclick="resetGame()">PLAY AGAIN</button>
        </div>
    </main>

<script>
const URL = "https://teachablemachine.withgoogle.com/models/Bcp6i6fs_/";

let model, webcam, ctx, maxPredictions;

// 遊戲邏輯與計時核心變數
let score = 0;
let lastStatus = "準備"; 
let isPunchCooldown = false;
let isGameRunning = false;
let isCameraInitialized = false; // 追蹤鏡頭是否已經啟動過

let notes = [];       
let particles = [];   
let targetY;          
let spawnTimer = 0;

// 限時與動態速度變數
let timeLeft = 60;
let timerInterval = null;
let speedMultiplier = 1.0; // 速度乘數，隨著時間推移而增加

async function initOrRestart() {
    const startBtn = document.getElementById("start-btn");
    const statusDiv = document.getElementById("status");
    
    startBtn.style.display = "none"; 

    // 如果鏡頭跟模型早就初始化好了，直接當作重新開始，不用重新下載
    if (isCameraInitialized) {
        startGameLogic();
        return;
    }

    statusDiv.innerText = "正在啟動 iPad 攝像頭...";
    const modelURL = URL + "model.json";
    const metadataURL = URL + "metadata.json";

    try {
        const size = 400;
        const flip = true; 
        webcam = new tmPose.Webcam(size, size, flip); 
        
        await webcam.setup({ facingMode: "user" }); 
        await webcam.play();
        
        statusDiv.innerText = "相機已就緒，正在加載 AI 模型...";

        model = await tmPose.load(modelURL, metadataURL);
        maxPredictions = model.getTotalClasses();

        const canvas = document.getElementById("canvas");
        canvas.width = 400;
        canvas.height = 300;
        ctx = canvas.getContext("2d");
        
        targetY = canvas.height * 0.75; 
        isCameraInitialized = true;

        startGameLogic();
    } catch (e) {
        console.error(e);
        statusDiv.innerText = "錯誤: 無法開啟相機或載入模型。";
        startBtn.style.display = "block";
    }
}

// 真正啟動/重啟遊戲邏輯與計時器
function startGameLogic() {
    const statusDiv = document.getElementById("status");
    statusDiv.innerText = "🔥 限時挑戰開始！請出拳！";
    
    // 重設數據
    score = 0;
    timeLeft = 60;
    speedMultiplier = 1.0;
    notes = [];
    particles = [];
    document.getElementById("score-display").innerText = score;
    document.getElementById("time-display").innerText = timeLeft + "s";
    document.getElementById("time-display").style.color = "#f59e0b"; // 恢復橘黃色
    document.getElementById("game-over-screen").style.display = "none";

    isGameRunning = true;
    
    // 啟動 60 秒倒數計時器
    if (timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(() => {
        timeLeft--;
        document.getElementById("time-display").innerText = timeLeft + "s";
        
        // 隨著時間減少，逐漸加快氣球速度乘數 (每過1秒，速度大約提升 2%)
        speedMultiplier = 1.0 + (60 - timeLeft) * 0.025; 
        
        // 最後 10 秒時間變紅提示
        if (timeLeft <= 10) {
            document.getElementById("time-display").style.color = "#ef4444";
        }

        // 時間到，結束遊戲
        if (timeLeft <= 0) {
            endGame();
        }
    }, 1000);

    // 啟動動畫與預測迴圈
    window.requestAnimationFrame(gameLoop);
}

// 結束遊戲
function endGame() {
    isGameRunning = false;
    clearInterval(timerInterval);
    document.getElementById("status").innerText = "⏰ 時間到！挑戰結束！";
    document.getElementById("final-score").innerText = score;
    document.getElementById("game-over-screen").style.display = "flex";
}

// 點擊再玩一次時的按鈕點擊事件
function resetGame() {
    document.getElementById("game-over-screen").style.display = "none";
    startGameLogic();
}

async function gameLoop(timestamp) {
    if (!isGameRunning) return;

    webcam.update(); 
    await predict(); 
    drawGame();      
    
    window.requestAnimationFrame(gameLoop);
}

async function predict() {
    if (!isGameRunning) return;
    
    const { pose, posenetOutput } = await model.estimatePose(webcam.canvas);
    const prediction = await model.predict(posenetOutput);

    let highestPred = "準備";
    let highestVal = 0;
    for (let i = 0; i < maxPredictions; i++) {
        if (prediction[i].probability > highestVal) {
            highestVal = prediction[i].probability;
            highestPred = prediction[i].className;
        }
    }

    const labelContainer = document.getElementById("label-container");
    let emoji = highestPred === "準備" ? "🧘 準備" : (highestPred === "左揮拳" ? "🥊 左" : "🥊 右");
    labelContainer.innerText = `${emoji} (${(highestVal * 100).toFixed(0)}%)`;

    if (highestVal > 0.80) {
        let oldStatus = lastStatus;
        lastStatus = highestPred;

        if (oldStatus === "準備" && lastStatus !== "準備" && !isPunchCooldown) {
            checkHit(lastStatus); 
            isPunchCooldown = true;
            setTimeout(() => { isPunchCooldown = false; }, 350); 
        }
    }
}

function drawGame() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(webcam.canvas, 0, 0, canvas.width, canvas.height);

    // 畫打擊判定線
    ctx.strokeStyle = "rgba(255, 255, 255, 0.4)";
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(0, targetY);
    ctx.lineTo(canvas.width, targetY);
    ctx.stroke();

    // 左打擊點 (藍色) -> 對應 左揮拳
    ctx.fillStyle = lastStatus === "左揮拳" ? "rgba(34, 211, 238, 0.7)" : "rgba(34, 211, 238, 0.2)";
    ctx.strokeStyle = "#22d3ee";
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(canvas.width * 0.25, targetY, 30, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    // 右打擊點 (紅色) -> 對應 右揮拳
    ctx.fillStyle = lastStatus === "右揮拳" ? "rgba(244, 63, 94, 0.7)" : "rgba(244, 63, 94, 0.2)";
    ctx.strokeStyle = "#f43f5e";
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(canvas.width * 0.75, targetY, 30, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    // 氣球生成邏輯
    spawnTimer++;
    // 隨著速度變快，生成氣球的間隔幀數也微微縮短，讓氣球源源不絕！
    let spawnRate = Math.max(25, 45 - Math.floor((60 - timeLeft) * 0.3));
    if (spawnTimer % spawnRate === 0) { 
        let isLeft = Math.random() > 0.5;
        // 初始速度大概在 3~5 之間（偏慢好打），後面會乘上 speedMultiplier
        let baseSpeed = 3 + Math.random() * 2; 
        notes.push({
            x: isLeft ? canvas.width * 0.25 : canvas.width * 0.75,
            y: -20,
            type: isLeft ? "左揮拳" : "右揮拳",
            speed: baseSpeed * speedMultiplier, // 乘上動態加乘
            active: true
        });
    }

    // 繪製與更新氣球
    for (let i = notes.length - 1; i >= 0; i--) {
        let note = notes[i];
        note.y += note.speed; 

        if (note.active) {
            ctx.fillStyle = note.type === "左揮拳" ? "#22d3ee" : "#f43f5e";
            ctx.beginPath();
            ctx.ellipse(note.x, note.y, 20, 24, 0, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.strokeStyle = "rgba(255,255,255,0.5)";
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(note.x, note.y + 24);
            ctx.lineTo(note.x, note.y + 36);
            ctx.stroke();
        }

        if (note.y > canvas.height + 40) {
            notes.splice(i, 1);
        }
    }

    // 繪製與更新碎裂粒子
    for (let i = particles.length - 1; i >= 0; i--) {
        let p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.alpha -= 0.05; 

        if (p.alpha <= 0) {
            particles.splice(i, 1);
            continue;
        }

        ctx.fillStyle = p.color === "left" ? `rgba(34, 211, 238, ${p.alpha})` : `rgba(244, 63, 94, ${p.alpha})`;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
    }
}

function checkHit(punchType) {
    for (let note of notes) {
        if (note.active && note.type === punchType) {
            let distance = Math.abs(note.y - targetY);
            
            // 隨著速度加快，微調擴大一點判定範圍 (45 -> 55)，避免速度太快抓不到
            let hitRange = 45 + (speedMultiplier * 3);
            if (distance < hitRange) {
                score += 10;
                note.active = false; 
                document.getElementById("score-display").innerText = score;
                
                createExplosion(note.x, note.y, punchType === "左揮拳" ? "left" : "right");
                break;
            }
        }
    }
}

function createExplosion(x, y, side) {
    for (let i = 0; i < 12; i++) {
        particles.push({
            x: x, y: y,
            vx: (Math.random() - 0.5) * 6,
            vy: (Math.random() - 0.5) * 6,
            size: 2 + Math.random() * 4,
            color: side,
            alpha: 1.0
        });
    }
}
</script>
</body>
</html>
