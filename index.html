<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 肩推計數器</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/ml5@0.12.2/dist/ml5.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        #canvas-container {
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-radius: 12px;
            overflow: hidden;
        }
    </style>
</head>
<body>

<div id="canvas-container"></div>

<script>
// ✅ 已經幫你替換好你的專屬模型網址了！
const URL = "https://teachablemachine.withgoogle.com/models/_qNCgNZbP/"; 

let video;
let classifier;
let label = "等待模型載入...";
let confidence = 0;

// 計數邏輯變數
let repCount = 0;         
let hasPressed = false;   
let triggerThreshold = 0.65; // 信心度門檻 65%

function preload() {
    // 載入你的 AI 模型
    classifier = ml5.imageClassifier(URL + 'model.json');
}

function setup() {
    // 建立 4:3 畫布
    let canvas = createCanvas(640, 480);
    canvas.parent('canvas-container');

    // iPad 鏡頭參數設定
    let constraints = {
        video: {
            facingMode: "user",
            width: 640,
            height: 480
        },
        audio: false
    };
    
    video = createCapture(constraints, function(stream) {
        console.log("鏡頭啟動成功");
    });
    video.size(640, 480);
    video.hide(); 

    // 開始偵測
    classifyVideo();
}

function draw() {
    // 畫出鏡頭畫面（鏡像翻轉，像照鏡子一樣）
    translate(width, 0);
    scale(-1, 1);
    image(video, 0, 0, width, height);
    
    // 還原座標系畫文字與 UI
    translate(width, 0);
    scale(-1, 1);

    // 上方半透明裝飾條
    noStroke();
    fill(0, 0, 0, 100);
    rect(0, 0, width, 80);

    // 顯示當前偵測標籤（肩推 / 肩下）
    textAlign(LEFT, CENTER);
    textSize(20);
    fill(255);
    text("目前動作: " + label + " (" + floor(confidence * 100) + "%)", 20, 40);

    // 顯示累計下數
    textAlign(RIGHT, CENTER);
    textSize(48);
    fill(255, 215, 0); 
    text(repCount + " 下", width - 20, 40);

    // 運動狀態即時提示
    if (hasPressed) {
        textAlign(CENTER, CENTER);
        textSize(32);
        fill(0, 255, 127); 
        text("偵測到肩推！請放回【肩下】", width / 2, height - 50);
    }
}

function classifyVideo() {
    classifier.classify(video, gotResult);
}
