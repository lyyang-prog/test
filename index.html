<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 活力集氣挑戰賽</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/ml5@0.12.2/dist/ml5.min.js"></script>
    
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0f172a; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
        }
        #canvas-container {
            position: relative;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border-radius: 20px;
            overflow: hidden;
            border: 4px solid #38bdf8; 
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <script>
    const modelURL = 'https://teachablemachine.withgoogle.com/models/_qNCgNZbP/';
    let video;
    let classifier;
    let label = "等待啟動";
    let confidence = 0.0;
    let score = 0;
    let feedbackText = "點擊畫面任意處啟動鏡頭與 AI 🚀";
    let isGameStarted = false; 
    let hasScoredThisTime = false; 

    const motivationalQuotes = [
        "加油！把手高高舉起！ 🙌",
        "再伸展多一點，你可以的！ 🔥",
        "運動讓大腦更清醒，繼續衝！ ⚡",
        "手舉得越高，能量就滿滿！ 💪",
        "堅持住！下一分馬上就到！ 🚀"
    ];

    function preload() {
        // 載入模型
        classifier = ml5.imageClassifier(modelURL + 'model.json');
    }

    function setup() {
        // 強制設定寬高，不讓它縮成一個點
        let canvasWidth = windowWidth > 640 ? 640 : windowWidth - 20;
        let canvasHeight = canvasWidth * (3 / 4);
        
        let canvas = createCanvas(canvasWidth, canvasHeight);
        canvas.parent('canvas-container');

        let constraints = {
            video: {
                facingMode: 'user',
                width: { ideal: 640 },
                height: { ideal: 480 }
            },
            audio: false
        };
        
        video = createCapture(constraints, function(stream) {
            console.log("鏡頭建立成功");
        });
        video.size(canvasWidth, canvasHeight);
        video.hide(); 
    }

    function mousePressed() {
        if (!isGameStarted) {
            isGameStarted = true;
            feedbackText = "AI 正在分析畫面中...";
            classifyVideo();
        }
    }

    function classifyVideo() {
        if (isGameStarted) {
            classifier.classify(video, gotResult);
        }
    }

    function gotResult(error, results) {
        if (error) {
            console.error(error);
            return;
        }
        
        label = results[0].label;
        confidence = results[0].confidence;

        if (label === "handup" && confidence >= 0.8) {
            if (!hasScoredThisTime) {
                score++;
                feedbackText = "🎯 太棒了！得分！ 🎯";
                hasScoredThisTime = true; 
            }
        } else if (label === "handdown") {
            if (hasScoredThisTime) {
                hasScoredThisTime = false;
                let randomIndex = floor(random(motivationalQuotes.length));
                feedbackText = motivationalQuotes[randomIndex];
            }
        }

        classifyVideo();
    }

    function draw() {
        background(15, 23, 42);

        if (isGameStarted) {
            push();
            translate(width, 0);
            scale(-1, 1);
            image(video, 0, 0, width, height);
            pop();
        }

        fill(15, 23, 42, 140);
        rect(0, 0, width, height);

        // 頂部 UI
        fill(30, 41, 59, 220);
        noStroke();
        rect(0, 0, width, 70);

        fill('#f43f5e'); 
        textSize(32);
        textAlign(LEFT, CENTER);
        textStyle(BOLD);
        text("SCORE: " + score, 20, 35);

        let barWidth = 140;
        let fillWidth = barWidth * confidence;
        
        noFill();
        stroke('#38bdf8');
        strokeWeight(2);
        rect(width - barWidth - 20, 25, barWidth, 20, 5);
        
        noStroke();
        if (isGameStarted && label === "handup" && confidence >= 0.8) {
            fill('#22c55e'); 
        } else {
            fill('#38bdf8'); 
        }
        rect(width - barWidth - 20, 25, fillWidth, 20, 5);

        fill(255);
        textSize(12);
        textAlign(RIGHT, CENTER);
        textStyle(NORMAL);
        let displayLabel = isGameStarted ? label.toUpperCase() : "WAITING";
        text(`${displayLabel} (${(confidence * 100).toFixed(0)}%)`, width - 20, 56);

        // 底部 UI
        fill(30, 41, 59, 240);
        rect(0, height - 70, width, 70);

        if (isGameStarted && label === "handup" && confidence >= 0.8) {
            fill('#4ade80'); 
        } else {
            fill('#e2e8f0'); 
        }
        textSize(18);
        textAlign(CENTER, CENTER);
        textStyle(BOLD);
        text(feedbackText, width / 2, height - 35);
    }

    function windowResized() {
        let canvasWidth = windowWidth > 640 ? 640 : windowWidth - 20;
        let canvasHeight = canvasWidth * (3 / 4);
        resizeCanvas(canvasWidth, canvasHeight);
    }
    </script>
</body>
</html>
