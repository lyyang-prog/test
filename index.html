<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 肩推計數器 - 原生核心版</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.11.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/pose@0.8.6/dist/teachablemachine-pose.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        #canvas-container {
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-radius: 12px;
            overflow: hidden;
            width: 640px;
            height: 480px;
            background-color: #000;
        }
        /* 讓鏡頭骨架畫面水平翻轉，像照鏡子一樣自然 */
        #canvas-container canvas {
            transform: scaleX(-1);
        }
        .ui-layer {
            position: absolute;
            left: 0;
            width: 100%;
            box-sizing: border-box;
            pointer-events: none;
            color: white;
            text-shadow: 1px 1px 4px rgba(0,0,0,0.8);
            z-index: 10;
        }
        .top-bar {
            top: 0;
            height: 80px;
            background: rgba(0, 0, 0, 0.6);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
        }
        .bottom-bar {
            bottom: 30px;
            text-align: center;
            font-size: 32px;
            color: #00FF7F;
            font-weight: bold;
        }
        /* 專為 iOS 設置的強制啟動大按鈕 */
        #start-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 18px 40px;
            font-size: 24px;
            font-weight: bold;
            color: white;
            background-color: #ff3b30; /* 警示紅，點擊解鎖 */
            border: none;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255,59,48,0.4);
            z-index: 999;
        }
    </style>
</head>
<body>

<div id="canvas-container">
    <button id="start-btn" onclick="init()">點擊解鎖 AI 相機</button>
    
    <div class="ui-layer top-bar">
        <div id="label-container" style="font-size: 20px;">請點擊按鈕解鎖相機</div>
        <div id="counter-container" style="font-size: 48px; color: #FFD700; font-weight: bold;">0 下</div>
    </div>

    <div id="hint-container" class="ui-layer bottom-bar">
