<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 節奏打擊王 - 實測版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/p5.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/pose@0.8/dist/teachablemachine-pose.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0f172a; /* 深藍黑色背景 */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            touch-action: none;
        }
        #canvas-container {
            position: relative;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            border-radius: 16px;
            overflow: hidden;
        }
        #loading {
            position: absolute;
            color: white;
            font-size: 22px;
            background: rgba(15, 23, 42, 0.95);
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            transition: opacity 0.5s;
        }
        .spinner {
            border: 4px solid rgba(255,255,255,0.1);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border-left-color: #38bdf8;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="canvas-container">
        <div id="loading">
            <div class="spinner"></div>
            <div id="loading-text">正在載入專屬 AI 動作模型...</div>
        </div>
    </div>

<script>
// === 載入你的專屬模型網址 ===

let isModelLoaded = false;

let notes = [];       // 掉落的氣球
let particles = [];   // 爆炸粒子特效
let targetY;          // 判定線 Y 座標
let spawnTimer = 0;
let isPunchCooldown = false;

    let canvasWidth = Math.min(window.innerWidth * 0.95, 800);

    let canvas = createCanvas(canvasWidth, canvasHeight);
    canvas.parent('canvas-container');
    
    targetY = height * 0.75; // 判定線位於畫面上方 75% 處
    
    // 啟動 AI
    initAI();
}

    const metadataURL = URL + "metadata.json";

        model = await tmPose.load(modelURL, metadataURL);
